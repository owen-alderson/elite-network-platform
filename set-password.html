<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set your password — Maia</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <div class="login-card">
      <a class="login-wordmark" href="index.html">MAIA</a>

      <p class="login-eyebrow">FINISH SIGN-IN</p>
      <h1 class="login-title" id="set-password-title">Set a password</h1>
      <p class="login-subtitle" id="set-password-subtitle">Pick something memorable. From now on you'll sign in with this — magic links only fire for forgotten passwords.</p>

      <form id="set-password-form" novalidate>
        <label for="new-password" class="login-label">New password</label>
        <input
          id="new-password"
          name="new-password"
          type="password"
          autocomplete="new-password"
          required
          minlength="8"
          placeholder="At least 8 characters">

        <label for="confirm-password" class="login-label">Confirm password</label>
        <input
          id="confirm-password"
          name="confirm-password"
          type="password"
          autocomplete="new-password"
          required
          minlength="8"
          placeholder="Same again">

        <button type="submit" class="btn-primary login-submit" id="set-password-submit">Set password &amp; continue</button>
      </form>

      <p id="set-password-status" class="login-status" role="status" aria-live="polite"></p>
    </div>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="set-password.js"></script>
</body>
</html>
